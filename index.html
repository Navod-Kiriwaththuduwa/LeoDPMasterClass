<!doctype html>
<!-- DP Year Interactive Web | GitHub Pages ready | Leo + Lions logos in header -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Conducting a DP Year | Interactive Web</title>
  <link rel="stylesheet" href="styles.css?v=slide7-open-clubs-v7">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-logos" aria-hidden="true">
        <img class="brand-logo leo-logo" src="assets/leo-logo.png" alt="Leo logo">
        <img class="brand-logo lions-logo" src="assets/lions-logo.png" alt="Lions International logo">
      </div>
      <div class="brand-text">
        <h1>Conducting a DP Year</h1>
        <small>Interactive masterclass + aligned workbook</small>
      </div>
    </div>
    <div class="top-actions" aria-label="Presentation actions">
      <button type="button" class="btn ghost" id="audienceBtn">Audience view</button>
      <button type="button" class="btn ghost" id="printBtn">Print workbook</button>
      <button type="button" class="btn primary" id="fullBtn">Fullscreen</button>
    </div>
  </header>
  <div class="app">
    <aside class="sidebar">
      <div class="progress-wrap">
        <div class="progress-label"><span>Workbook progress</span><span id="progressText">0%</span></div>
        <div class="progress"><span id="progressBar"></span></div>
      </div>
      <nav class="slide-nav" id="slideNav"></nav>
    </aside>
    <main class="main">
      <section class="stage" id="stage"></section>
      <aside class="workbook" id="workbook"></aside>
    </main>
  </div>
  <div class="bottom-nav">
    <button type="button" class="btn" id="prevBtn">← Previous</button>
    <div class="status" id="mobileStatus">1 / 16</div>
    <button type="button" class="btn primary" id="nextBtn">Next →</button>
  </div>
  <div class="print-area" id="printArea"></div>
  <script src="app.js?v=slide7-open-clubs-v7"></script>
</body>
</html>
